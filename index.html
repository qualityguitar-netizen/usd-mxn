
<div style="padding: 1.5rem 0;">
  <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem;">
    <div>
      <p style="font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px;">usd_mxn_tracker.html</p>
      <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0;">Save as <code style="font-size:12px">index.html</code> before uploading to GitHub</p>
    </div>
    <button id="dl-btn" style="padding: 10px 20px; font-size: 14px; font-weight: 500; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); cursor: pointer; white-space: nowrap;">Download</button>
  </div>
</div>

<script>
document.getElementById('dl-btn').addEventListener('click', function() {
  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USD \u2192 MXN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --border: #252525;
    --text: #f0ede8; --muted: #6b6b6b; --accent: #c8f04b;
    --red: #ff5a5a; --green: #4bdf8a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .pair { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .rate-num { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 500; letter-spacing: -2px; line-height: 1; color: var(--text); }
  .rate-unit { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 100px; margin-top: 10px; }
  .badge.up { background: rgba(255,90,90,0.15); color: var(--red); }
  .badge.down { background: rgba(75,223,138,0.15); color: var(--green); }
  .badge.flat { background: rgba(107,107,107,0.2); color: var(--muted); }
  .badge.loading { background: rgba(200,240,75,0.1); color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
  .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .conv-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .conv-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); width: 36px; flex-shrink: 0; }
  .conv-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .conv-input:focus { border-color: var(--accent); }
  .conv-result { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--accent); }
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .updated { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .refresh-btn { background: var(--accent); color: #0d0d0d; border: none; border-radius: 8px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }
  .error-msg { font-size: 12px; color: var(--red); font-family: 'DM Mono', monospace; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="pair">USD / MXN</span>
    <div class="dot"></div>
  </div>
  <div class="rate-block" style="margin-bottom:1.5rem">
    <div class="rate-num" id="rate-num">--.-\u2014</div>
    <div class="rate-unit">Mexican pesos per US dollar</div>
    <div class="badge loading" id="badge">\u25cf fetching live rate\u2026</div>
    <div class="error-msg" id="error-msg">Could not fetch rate. Check your connection and retry.</div>
  </div>
  <hr class="divider">
  <div class="stats">
    <div class="stat"><div class="stat-label">Prev close</div><div class="stat-val" id="prev-val">\u2013</div></div>
    <div class="stat"><div class="stat-label">Change</div><div class="stat-val" id="change-val">\u2013</div></div>
  </div>
  <div class="section-label">Converter</div>
  <div class="conv-row">
    <span class="conv-label">USD</span>
    <input class="conv-input" type="number" id="usd-in" value="1" min="0" step="any">
    <div class="conv-result" id="mxn-out">\u2013</div>
    <span class="conv-label" style="text-align:right">MXN</span>
  </div>
  <div class="conv-row">
    <span class="conv-label">MXN</span>
    <input class="conv-input" type="number" id="mxn-in" placeholder="0" min="0" step="any">
    <div class="conv-result" id="usd-out">\u2013</div>
    <span class="conv-label" style="text-align:right">USD</span>
  </div>
  <div class="footer">
    <div class="updated" id="updated-text">\u2013</div>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchRate()">Refresh \u21bb</button>
  </div>
</div>
<script>
let rate = null;
async function fetchRate() {
  const btn = document.getElementById('refresh-btn');
  const badge = document.getElementById('badge');
  const errMsg = document.getElementById('error-msg');
  btn.disabled = true;
  badge.className = 'badge loading';
  badge.textContent = '\u25cf fetching live rate\u2026';
  errMsg.style.display = 'none';
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    rate = data.rates.MXN;
    const now = new Date();
    document.getElementById('rate-num').textContent = rate.toFixed(4);
    document.getElementById('updated-text').textContent =
      now.toLocaleDateString('es-MX', { day:'numeric', month:'short' }) + ' ' +
      now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('prev-val').textContent = '\u2013';
    document.getElementById('change-val').textContent = '\u2013';
    badge.className = 'badge flat';
    badge.textContent = '\u25cf live';
    updateConv();
  } catch(e) {
    try {
      const res2 = await fetch('https://api.frankfurter.app/latest?from=USD&to=MXN');
      const data2 = await res2.json();
      rate = data2.rates.MXN;
      const now = new Date();
      document.getElementById('rate-num').textContent = rate.toFixed(4);
      document.getElementById('updated-text').textContent =
        now.toLocaleDateString('es-MX', { day:'numeric', month:'short' }) + ' ' +
        now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
      badge.className = 'badge flat';
      badge.textContent = '\u25cf live (ECB)';
      updateConv();
    } catch(e2) {
      errMsg.style.display = 'block';
      badge.className = 'badge up';
      badge.textContent = '\u25cf error';
    }
  }
  btn.disabled = false;
}
function updateConv() {
  if (!rate) return;
  const u = parseFloat(document.getElementById('usd-in').value);
  if (!isNaN(u)) document.getElementById('mxn-out').textContent = (u * rate).toFixed(2);
}
function updateFromMXN() {
  if (!rate) return;
  const m = parseFloat(document.getElementById('mxn-in').value);
  if (!isNaN(m)) document.getElementById('usd-out').textContent = (m / rate).toFixed(2);
}
document.getElementById('usd-in').addEventListener('input', updateConv);
document.getElementById('mxn-in').addEventListener('input', updateFromMXN);
fetchRate();
<\/script>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
