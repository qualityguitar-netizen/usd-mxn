<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USD → MXN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #161616; --border: #252525;
  --text: #f0ede8; --muted: #6b6b6b; --accent: #c8f04b;
  --red: #ff5a5a; --green: #4bdf8a;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.pair { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.rate-num { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 500; letter-spacing: -2px; }
.rate-unit { font-size: 14px; color: var(--muted); margin-top: 4px; }
.badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
.badge.up { background: rgba(255,90,90,0.15); color: var(--red); }
.badge.down { background: rgba(75,223,138,0.15); color: var(--green); }
.badge.flat { background: rgba(107,107,107,0.2); color: var(--muted); }
.badge.loading { background: rgba(200,240,75,0.1); color: var(--accent); }
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.conv-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.conv-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); width: 36px; }
.conv-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; }
.conv-input:focus { border-color: var(--accent); }
.conv-result { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; }
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
.updated { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.refresh-btn { background: var(--accent); color: #0d0d0d; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
.refresh-btn:hover { opacity: 0.85; }
.refresh-btn:disabled { opacity: 0.4; cursor: default; }
.error-msg { font-size: 12px; color: var(--red); font-family: 'DM Mono', monospace; margin-top: 8px; display: none; }
.chart-wrap { margin-top: 1.5rem; }
.chart-labels { display: flex; justify-content: space-between; margin-top: 6px; }
.chart-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.chart-range { display: flex; justify-content: space-between; margin-bottom: 4px; }
.chart-range span { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.chart-loading { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; padding: 24px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="pair">USD / MXN</span>
    <div class="dot"></div>
  </div>
  <div class="rate-block" style="margin-bottom:1.5rem">
    <div class="rate-num" id="rate-num">--</div>
    <div class="rate-unit">Mexican pesos per US dollar</div>
    <div class="badge loading" id="badge">● fetching live rate…</div>
    <div class="error-msg" id="error-msg">Could not fetch rate. Check your connection and retry.</div>
  </div>
  <hr class="divider">
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Prev close</div>
      <div class="stat-val" id="prev-val">–</div>
    </div>
    <div class="stat">
      <div class="stat-label">Change</div>
      <div class="stat-val" id="change-val">–</div>
    </div>
  </div>
  <div class="section-label">Converter</div>
  <div class="conv-row">
    <span class="conv-label">USD</span>
    <input class="conv-input" type="number" id="usd-in" value="1" min="0" step="any">
    <div class="conv-result" id="mxn-out">–</div>
    <span class="conv-label" style="text-align:right">MXN</span>
  </div>
  <div class="conv-row">
    <span class="conv-label">MXN</span>
    <input class="conv-input" type="number" id="mxn-in" placeholder="0" min="0" step="any">
    <div class="conv-result" id="usd-out">–</div>
    <span class="conv-label" style="text-align:right">USD</span>
  </div>
  <hr class="divider">
  <div class="section-label">30-day history</div>
  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-loading" id="chart-loading">● loading chart…</div>
  </div>
  <div class="footer">
    <div class="updated" id="updated-text">–</div>
    <button class="refresh-btn" id="refresh-btn" onclick="init()">Refresh ↻</button>
  </div>
</div>
<script>
let rate = null;

function getDateStr(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}

function buildChart(dates, values) {
  const W = 356, H = 90, PL = 4, PR = 4, PT = 8, PB = 8;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const xStep = (W - PL - PR) / (values.length - 1);
  const pts = values.map((v, i) => {
    const x = PL + i * xStep;
    const y = PT + (1 - (v - min) / range) * (H - PT - PB);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });
  const polyline = pts.join(' ');
  const firstPt = pts[0].split(',');
  const lastPt = pts[pts.length - 1].split(',');
  const fillPts = polyline + ' ' + lastPt[0] + ',' + (H - PB) + ' ' + firstPt[0] + ',' + (H - PB);
  const trend = values[values.length - 1] >= values[0] ? '#ff5a5a' : '#4bdf8a';

  const startLabel = dates[0].slice(5).replace('-', '/');
  const endLabel = dates[dates.length - 1].slice(5).replace('-', '/');

  const wrap = document.getElementById('chart-wrap');
  wrap.innerHTML =
    '<div class="chart-range">' +
      '<span>' + min.toFixed(2) + '</span>' +
      '<span>' + max.toFixed(2) + '</span>' +
    '</div>' +
    '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:90px;display:block">' +
      '<polygon points="' + fillPts + '" fill="' + trend + '" opacity="0.08"/>' +
      '<polyline points="' + polyline + '" fill="none" stroke="' + trend + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<circle cx="' + lastPt[0] + '" cy="' + lastPt[1] + '" r="3" fill="' + trend + '"/>' +
    '</svg>' +
    '<div class="chart-labels">' +
      '<span class="chart-label">' + startLabel + '</span>' +
      '<span class="chart-label">' + endLabel + '</span>' +
    '</div>';
}

async function fetchChart() {
  const start = getDateStr(31);
  const end = getDateStr(1);
  try {
    const res = await fetch('https://api.frankfurter.app/' + start + '..' + end + '?from=USD&to=MXN');
    const data = await res.json();
    const dates = Object.keys(data.rates).sort();
    const values = dates.map(d => data.rates[d].MXN);
    if (dates.length > 1) {
      buildChart(dates, values);
    } else {
      document.getElementById('chart-wrap').innerHTML = '<div class="chart-loading">not enough data</div>';
    }
  } catch(e) {
    document.getElementById('chart-wrap').innerHTML = '<div class="chart-loading">chart unavailable</div>';
  }
}

async function fetchRate() {
  const btn = document.getElementById('refresh-btn');
  const badge = document.getElementById('badge');
  const errMsg = document.getElementById('error-msg');
  btn.disabled = true;
  badge.className = 'badge loading';
  badge.textContent = '● fetching live rate…';
  errMsg.style.display = 'none';
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    rate = data.rates.MXN;
    const now = new Date();
    document.getElementById('rate-num').textContent = rate.toFixed(4);
    document.getElementById('updated-text').textContent =
      now.toLocaleDateString('es-MX', { day:'numeric', month:'short' }) + ' ' +
      now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('prev-val').textContent = '–';
    document.getElementById('change-val').textContent = '–';
    badge.className = 'badge flat';
    badge.textContent = '● live';
    updateConv();
  } catch(e) {
    try {
      const res2 = await fetch('https://api.frankfurter.app/latest?from=USD&to=MXN');
      const data2 = await res2.json();
      rate = data2.rates.MXN;
      const now = new Date();
      document.getElementById('rate-num').textContent = rate.toFixed(4);
      document.getElementById('updated-text').textContent =
        now.toLocaleDateString('es-MX', { day:'numeric', month:'short' }) + ' ' +
        now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
      badge.className = 'badge flat';
      badge.textContent = '● live (ECB)';
      updateConv();
    } catch(e2) {
      errMsg.style.display = 'block';
      badge.className = 'badge up';
      badge.textContent = '● error';
    }
  }
  btn.disabled = false;
}

function updateConv() {
  if (!rate) return;
  const u = parseFloat(document.getElementById('usd-in').value);
  if (!isNaN(u)) document.getElementById('mxn-out').textContent = (u * rate).toFixed(2);
}

function updateFromMXN() {
  if (!rate) return;
  const m = parseFloat(document.getElementById('mxn-in').value);
  if (!isNaN(m)) document.getElementById('usd-out').textContent = (m / rate).toFixed(2);
}

async function init() {
  await Promise.all([fetchRate(), fetchChart()]);
}

document.getElementById('usd-in').addEventListener('input', updateConv);
document.getElementById('mxn-in').addEventListener('input', updateFromMXN);
init();
</script>
</body>
</html>
